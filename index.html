<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <title>Alfík · Detský portál</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Fredoka:wght@500;600;700&family=Baloo+2:wght@500;600;700;800&family=Mulish:wght@400;500;600;700;800;900&family=Cinzel:wght@600;700;800&family=Alfa+Slab+One&family=Bowlby+One+SC&family=Cabin+Sketch:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0f1923;
    }
    body { font-family: "Mulish", system-ui, sans-serif; }
    #root {
      width: 1440px;
      height: 900px;
      position: absolute;
      top: 50%;
      left: 50%;
      overflow: hidden;
    }
    /* ensure every kid screen fills the full 900px */
    .alf-root { height: 900px !important; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- viewport scaling (plain JS, no Babel needed) -->
  <script>
    function scalePortal() {
      var s = Math.min(window.innerWidth / 1440, window.innerHeight / 900);
      var r = document.getElementById('root');
      if (r) r.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    }
    window.addEventListener('resize', scalePortal);
    scalePortal();
  </script>

  <script src="image-slot.js?v=2"></script>
  <script type="text/babel" src="shared.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="kid.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="kid-2b-mapa.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="kid-glyphs.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="kid-2c2-kategorie.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="kid-2c1-kniznica.jsx?v=2" charset="utf-8"></script>
  <script type="text/babel" src="portal-nav.jsx?v=2" charset="utf-8"></script>

  <script type="text/babel">
    const portalRoot = ReactDOM.createRoot(document.getElementById('root'));
    portalRoot.render(<PortalRouter />);
  </script>
</body>
</html>
